server:
  port: 9091

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5432/novix_user_service
    username: novixuser
    password: novix1234
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        service-name: ${spring.application.name}
        health-check-path: /actuator/health
        health-check-interval: 10s

jwt:
  secret: 428472B4B625064A586E404E6352325367566655697072357538782F413F46B5
  expiration: 24*60*60*100       # 24 hours in ms
  refresh-expiration: 7*24*60*60*100  # 7 days in ms

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
